name: Healthcheck

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Project
        uses: ./.github/actions/setup-node

      - name: Check typing and formatting
        run: |
          pnpm check
          pnpm lint

      - name: Run Tests
        run: pnpm test
